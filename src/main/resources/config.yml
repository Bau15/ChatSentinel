# Cleans up whitelisted expressions from the message
# This is basically a bypass for certain patterns
whitelist:
  enabled: true

filter-compile:
  notify-admins: true
  notify-permission: "chatsentinel.admin"

warnings:
  delivery:
    message: true
    action-bar: true

redis:
  enabled: false
  uri: "redis://localhost:6379/0"
  channel: "chatsentinel:alerts"
  instance-id: "auto"
  publish-alerts: true
  receive-alerts: true

velocity:
  # legacy-deny can block/modify chat on Velocity but may kick 1.19.1+ signed-chat clients.
  # warn-only only sends notifications, webhooks, and spy alerts without changing the chat event.
  signed-chat-policy: "legacy-deny"
  signed-chat-warning-on-startup: true

spy:
  enabled: true
  permission: "chatsentinel.spy"
  format: "&8[&bCS Spy&8] &e%player% &7failed &6%module% &8file=&f%source_file% &8match=&c%matched_text% &8msg=&f%message%"

social-spy:
  enabled: true
  root-permission: "chatsentinel.socialspy"
  include-self: false
  show-server: true
  unavailable-platform-message: "&cThis SocialSpy module is not available on this platform."
  invalid-module-message: "&cUnknown SocialSpy module. Available: &f%modules%"
  enabled-message: "&aSocialSpy enabled for &f%module%&a."
  disabled-message: "&cSocialSpy disabled for &f%module%&c."
  enabled-all-message: "&aSocialSpy enabled for all permitted modules."
  disabled-all-message: "&cSocialSpy disabled for all permitted modules."
  status-header: "&eSocialSpy status:"
  status-line: "&7- &f%module%&7: %state%"
  state-enabled: "&aenabled"
  state-disabled: "&cdisabled"
  no-permission: "&cYou do not have permission to use this SocialSpy module."

  trim:
    command-content-chars: 160
    message-content-chars: 160
    sign-line-chars: 80
    book-title-chars: 40
    book-content-chars: 50
    anvil-name-chars: 80
    append-ellipsis: "..."

  modules:
    messages:
      enabled: true
      default-enabled: true
      permission: "chatsentinel.socialspy.messages"
      format: "&8[&dSpy&8] &e%player% &7messaged &f%target%&8: &f%message%"
    signs:
      enabled: true
      default-enabled: true
      permission: "chatsentinel.socialspy.signs"
      format: "&8[&dSpy&8] &e%player% &7placed/edited sign at &f%world% %x% %y% %z%&8: &f%content%"
    books:
      enabled: true
      default-enabled: true
      permission: "chatsentinel.socialspy.books"
      format: "&8[&dSpy&8] &e%player% &7wrote a book &f%title%&8: &f%content%"
    anvils:
      enabled: true
      default-enabled: true
      permission: "chatsentinel.socialspy.anvils"
      format: "&8[&dSpy&8] &e%player% &7renamed an item&8: &f%old_name% &7-> &f%new_name%"
    commands:
      enabled: true
      default-enabled: false
      permission: "chatsentinel.socialspy.commands"
      format: "&8[&dSpy&8] &e%player% &7ran command&8: &f/%command%"

  # Private-message commands. These are treated as SocialSpy messages, not generic commands.
  # Format: command:targetArgIndex:messageStartArgIndex
  # Use targetArgIndex -1 for reply-style commands with no explicit target.
  message-command-patterns:
    - "msg:1:2"
    - "tell:1:2"
    - "w:1:2"
    - "whisper:1:2"
    - "pm:1:2"
    - "m:1:2"
    - "message:1:2"
    - "t:1:2"
    - "reply:-1:1"
    - "r:-1:1"
    - "dm:1:2"
    - "directmessage:1:2"
    - "respond:-1:1"

  # Never spy sensitive authentication/password commands by default.
  ignored-command-roots:
    - "login"
    - "l"
    - "register"
    - "reg"
    - "changepassword"
    - "cp"
    - "email"
    - "2fa"
    - "captcha"
    - "chatsentinel"
    - "socialspy"
    - "sspy"
    - "autocorrect"
    - "correction"
    - "servermute"
    - "muteall"
    - "muteserver"

server-mute:
  enabled: true
  muted: false
  bypass-permission: "chatsentinel.mute.bypass"

no-move-chat:
  # Bukkit backend only. BungeeCord/Velocity cannot observe player movement.
  # Player may chat after moving this many blocks from join location, or after teleport if allow-teleport is true.
  enabled: true
  bypass-permission: ""
  min-distance-blocks: 5.0
  allow-teleport: true

# Stores recent visible chat lines for smart clear/delete replay.
# Bukkit uses event chat format when available. BungeeCord/Velocity use proxy-replay-format.
chat-snapshot:
  enabled: true
  history-size: 50
  clear-lines: 128
  proxy-replay-format: "&7[%player%] &f%message%"
  live-delete-click:
    enabled: true
    permission: "chatsentinel.delete"
    prefix: "&8[&cX&8] "
    hover: "&eClick to delete this message."
    command: "/deletechat %id%"

general:
  # If enabled, other checks will ignore non-latin characters to improve detection.
  sanitize: true

  # If enabled, other checks will ignore player names to improve detection.
  sanitize-names: true

  # Filter and remove non-latin characters from all messages.
  filter-other: false

  # Players with this permission bypass enforcement modules by default.
  # This global bypass intentionally does not skip UX correction modules listed below.
  global-bypass-permission: "chatsentinel.bypass"

  # Modules ignored by global-bypass-permission.
  # OPs should still get correction by default.
  global-bypass-excluded-modules:
    - correction
    - no-move-chat

  # Commands that will be treated as normal messages
  commands:
    - /broadcast
    - /ebroadcast
    - /bc
    - /ebc
    - /tell
    - /etell
    - /msg
    - /emsg
    - /reply
    - /ereply
    - /r
    - /er
    - /global
    - /g

# Replaces or blocks characters outside the allowed regex.
# If this section is missing, general.filter-other: true enables this module with these defaults.
allowed-characters:
  enabled: false
  mode: "replace"
  allowed-regex: "[A-Za-z0-9 _.,!?@#:/;\\-()\\[\\]{}'\"]"
  replacement: ""

# Corrects common misspelled words in chat.
# This module is a UX feature, not a punishment module.
# It only replaces exact whole words listed under replacements.
correction:
  enabled: true
  custom-module-name: "Correction"
  notify-player: true
  apply-to-normal-commands: false
  preserve-capitalization: true
  ignore-player-names: true
  max-corrections-per-message: 8
  bypass-permission: ""

  # Words that must never be corrected even if someone later adds them to replacements.
  # Keep Minecraft slang, acronyms, commands, metrics, and technical abbreviations here.
  ignored-words:
    - afk
    - brb
    - gg
    - ez
    - idk
    - lmk
    - tbh
    - imo
    - imho
    - btw
    - omg
    - lol
    - lmao
    - rofl
    - ty
    - thx
    - pls
    - plz
    - tps
    - fps
    - ms
    - kb
    - pvp
    - pve
    - tp
    - tpa
    - rtp
    - msg
    - dm
    - swbe
    - sbe

  # Format: wrong-word: "correct-word"
  # Keys are read case-insensitively. Values keep configured spelling.
  replacements:
    teh: "the"
    hte: "the"
    thhe: "the"
    adn: "and"
    nad: "and"
    taht: "that"
    thta: "that"
    tihs: "this"
    thsi: "this"
    tthis: "this"
    whta: "what"
    waht: "what"
    wath: "what"
    doign: "doing"
    doig: "doing"
    doin: "doing"
    wher: "where"
    wheer: "where"
    werhe: "where"
    hwere: "where"
    wich: "which"
    whcih: "which"
    hwich: "which"
    becuase: "because"
    becasue: "because"
    bceause: "because"
    beacuse: "because"
    becausee: "because"
    cosider: "consider"
    considder: "consider"
    freind: "friend"
    firend: "friend"
    frend: "friend"
    firiend: "friend"
    recieve: "receive"
    recieved: "received"
    recieving: "receiving"
    receieve: "receive"
    seperate: "separate"
    seperated: "separated"
    seperately: "separately"
    definately: "definitely"
    definatly: "definitely"
    definetly: "definitely"
    definitly: "definitely"
    occassion: "occasion"
    occassionally: "occasionally"
    ocasionally: "occasionally"
    neccessary: "necessary"
    necesary: "necessary"
    neccesary: "necessary"
    accomodate: "accommodate"
    acommodate: "accommodate"
    tommorow: "tomorrow"
    tomorow: "tomorrow"
    tommorrow: "tomorrow"
    yesturday: "yesterday"
    yestarday: "yesterday"
    beleive: "believe"
    belive: "believe"
    beleiving: "believing"
    truely: "truly"
    realy: "really"
    reallly: "really"
    probaly: "probably"
    probablly: "probably"
    probobly: "probably"
    alwasy: "always"
    awlays: "always"
    alot: "a lot"
    atleast: "at least"

  # Checks if the player is using blacklisted words.
blacklist:
  enabled: true

  # Custom module name.
  custom-module-name: "Swearing"

  # Show a fake message to the player to make him think his message was sent.
  # This doesnt work if the plugin is on BungeeCord.
  fake_message: false

  # Hide the words the player wrote with a ***
  censorship:
    enabled: false
    # Replacement to be used
    replacement: "***"

  warn:
    # Amount of warns required to execute the commands.
    # Set to -1 to disable this feature completely.
    max: 3

    # Sends a notification to players with chatsentinel.notify permission.
    # Set to "" to disable this feature completely.
    # You can use %server% on BungeeCord to get the server name.
    notification: "&c&lCS: &e%player% &ffailed &6%module% &7(&c%message%&7)"

    # Discord webhook notification.
    webhook-notification: true

  # You need a mute plugin for ChatSentinel to mute players. (Recommended: LiteBans/AdvancedBans)
  # Set to [] to disable this feature completely.
  punishments:
    - "mute -s %player% Offensive Language (%message%) 1d"
  
  # if fake_message is false
  # and if censorship is false
  # The message will be cancelled.
  block_raw_message: true

  # Per-folder blacklist modules. The first folder under blacklist/ is the module id.
  modules:
    security:
      enabled: true
      custom-module-name: "Security"
    advertisement:
      enabled: true
      custom-module-name: "Advertising"
    offense:
      enabled: true
      custom-module-name: "Offense"
    user:
      enabled: true
      custom-module-name: "Custom"
    client:
      enabled: true
      custom-module-name: "Client"

# Corrects excessive capitalization in player messages.
capitalization:
  enabled: true

  # Custom module name.
  custom-module-name: "Capitalization"

  # If this is true it will correct excessive uppercase with lowercase text.
  correct: true

  # If enabled, lowercase-starting normal sentences are corrected to uppercase first letter.
  capitalize-first-letter: true

  # Maximum amount of uppercase letters allowed.
  max-uppercase: 8

  bypass-permission: "chatsentinel.bypass.capitalization"

  # If enabled, online player names are ignored by the capitalization check.
  whitelist-player-names: true

  # Tokens ignored by the capitalization check before counting uppercase letters.
  whitelist:
    - "USA"
    - "VIP"

  warn:
    # Amount of warns required to execute the commands.
    # Set to -1 to disable this feature completely.
    max: -1

    # Sends a notification to players with chatsentinel.notify permission.
    # Set to "" to disable this feature completely.
    notification: "&c&lCS: &e%player% &ffailed &6%module% &7(&c%message%&7)"

    # Discord webhook notification.
    webhook-notification: true

  # You need a mute plugin for ChatSentinel to mute players. (Recommended: LiteBans/AdvancedBans)
  # Set to [] to disable this feature completely.
  punishments: []

# Checks if player is chatting too fast.
cooldown:
  enabled: true

  # Time in milliseconds.
  time:
    repeat-global: 1000
    repeat: 10000
    normal: 1000
    command: 400

# Checks if the player is sending repeated similar messages.
similarity:
  enabled: true
  custom-module-name: "Similarity"
  threshold-percentage: 75.0
  compare-last-messages: 3
  min-normalized-length: 4
  normalize:
    strip-special-characters: true
    strip-accents: true
    collapse-repeated-characters: true

# Checks if player is using too many repeated characters.
flood:
  enabled: true

  # Custom module name.
  custom-module-name: "Flood"

  # If this is true it will replace the flood instead of cancelling it.
  # Example: Heloooooo would be converted to just Helloo
  replace: true

  # Regex pattern to do the checks and replacement.
  pattern: '(([\p{L}\p{N}_])\2{3,})|([^\p{L}\p{N}_ñ]{20,})|(^.{220,}$)'

  warn:
    # Amount of warns required to execute the commands.
    # Set to -1 to disable this feature completely.
    max: -1

    # Sends a notification to players with chatsentinel.notify permission.
    # Set to "" to disable this feature completely.
    notification: "&c&lCS: &e%player% &ffailed &6%module% &7(&c%message%&7)"

    # Discord webhook notification.
    webhook-notification: true

  # You need a mute plugin for ChatSentinel to mute players. (Recommended: LiteBans/AdvancedBans)
  # Set to [] to disable this feature completely.
  punishments: []

# Checks if the player is using syntax.
# Example: testplugin:testcommand
syntax:
  # Do you want to enable this module?
  enabled: true

  # Custom module name.
  custom-module-name: "Syntax"

  # Syntax commands that will not be checked.
  # Set to {} to disable whitelist.
  whitelist:
    - "/strikepractice:"

  warn:
    # Amount of warns required to execute the commands.
    # Set to -1 to disable this feature completely.
    max: -1

    # Sends a notification to players with chatsentinel.notify permission.
    # Set to "" to disable this feature completely.
    notification: "&c&lCS: &e%player% &ffailed &6%module% &7(&c%message%&7)"

    # Discord webhook notification.
    webhook-notification: true

  # You need a mute plugin for ChatSentinel to mute players. (Recommended: LiteBans/AdvancedBans)
  # Set to [] to disable this feature completely.
  punishments: []

# Discord webhook configuration.
discord-webhook:
  # Do you want to enable this module?
  enabled: false

  # Discord webhook URL.
  webhook-url: "Your Discord Webhook URL here"

  sender:
    # Sender avatar URL.
    avatar-url: "https://avatars.githubusercontent.com/u/53847752?s=128&v=4"

    # Sender username.
    username: "ArkFlame Development"

  author:
    # Author name.
    name: "ChatSentinel"

    # Author URL.
    url: "https://builtbybit.com/resources/23698/"

    # Author icon URL.
    icon-url: "https://avatars.githubusercontent.com/u/53847752?s=48&v=4"

  # Discord webhook title.
  title: "Notification"

  # Discord webhook color (in hexadecimal format).
  color: "#55FFFF"

  # Discord webhook description.
  description: "**%player%** failed **%module%** (%warns%/%maxwarns%)"

  field-names:
    # Message field name.
    message: "Message"

    # Server field name.
    server: "Server"

    # Source file field name.
    source-file: "Source File"

    # Source module field name.
    source-module: "Source Module"

    # Matched text field name.
    matched-text: "Matched Text"

  footer:
    # Footer text.
    text: "ChatSentinel Detection"

    # Footer icon url.
    icon-url: "https://avatars.githubusercontent.com/u/53847752?s=48&v=4"

  # Discord webhook thumbnail URL.
  thumbnail-url: "https://avatars.githubusercontent.com/u/53847752?s=128&v=4"
