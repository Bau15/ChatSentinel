# This plugin uses Regex for checking messages.
expressions:
  # Detects links/domains in chat.
  - '(?i)(?:[A-Za-z0-9](?:\s?[A-Za-z0-9]){2,64}\s{1,16}\.\s{1,16}[A-Za-z]{1,10}\b|(?:[A-Za-z0-9]{1,32}\s{1,16}){2,3}[A-Za-z0-9-]{1,32}\s{1,16}\.\s{1,16}[A-Za-z]{1,10}\b|(?:[A-Za-z0-9-]{1,63}\.)+[A-Za-z]{2,10}\b)'
  # Detects short 4-char server names.
  - '(?i)\b(?:\d[a-z]\d[a-z]|[a-z]\d[a-z]\d)\b'
  # Strict IPv4, each octet 0-255.
  - '\b(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\b'
  # Exactly ':' + 5 digits.
  - '^:\d{5}$'
